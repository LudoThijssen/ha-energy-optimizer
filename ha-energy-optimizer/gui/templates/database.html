{% extends "base.html" %}
<!-- name:         database.html -->
<!-- part of:      ha-energy-optimizer-->
<!-- location:     /ha-energy-optimizer/ha-energy-optimizer/gui/templates/database.html -->
<!-- part version: p_v0.4 -->
<!-- altered:      2026-06-30 -->
{% block title %}Database — HA Energy Optimizer{% endblock %}
{% block content %}

<h1><span class="mdi mdi-database-outline"></span> Database</h1>
<p class="subtitle">MySQL-verbindingsinstellingen</p>

{% if saved %}
<div class="alert alert-success"><span class="mdi mdi-check"></span> Instellingen opgeslagen</div>
{% endif %}

<form method="POST" id="db-form">
  <div class="card">
    <h2><span class="mdi mdi-lan-connect"></span> Verbinding</h2>
    <div class="field-row">
      <div class="field">
        <label>Host</label>
        <input type="text" name="host" id="db-host"
               placeholder="core-mariadb of 192.168.1.100"
               value="{{ options.get('database', {}).get('host', '') }}" required>
        <div class="hint">IP-adres of hostnaam van uw MySQL-server</div>
      </div>
      <div class="field" style="max-width:120px">
        <label>Poort</label>
        <input type="number" name="port" id="db-port"
               value="{{ options.get('database', {}).get('port', 3306) }}" required>
      </div>
    </div>
    <div class="field">
      <label>Databasenaam</label>
      <input type="text" name="name" id="db-name"
             value="{{ options.get('database', {}).get('name', 'energy') }}" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Gebruikersnaam</label>
        <input type="text" name="user" id="db-user"
               value="{{ options.get('database', {}).get('user', 'energy') }}" required>
      </div>
      <div class="field">
        <label>Wachtwoord</label>
        <input type="password" name="password" id="db-pass"
               value="{{ options.get('database', {}).get('password', '') }}">
      </div>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn btn-primary"><span class="mdi mdi-content-save-outline"></span> Opslaan</button>
      <button type="button" class="btn btn-secondary" onclick="testConnection()">
        <span class="mdi mdi-connection"></span> Test verbinding
      </button>
      <span id="test-result"></span>
    </div>
  </div>
</form>

<script>
async function testConnection() {
  const result = document.getElementById("test-result");
  result.textContent = "Testen...";
  result.style.color = "#6b7280";

  const payload = {
    host:     document.getElementById("db-host").value,
    port:     document.getElementById("db-port").value,
    name:     document.getElementById("db-name").value,
    user:     document.getElementById("db-user").value,
    password: document.getElementById("db-pass").value,
  };

  try {
    const resp = await fetch(apiUrl("/database/test"), {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    result.textContent = data.message;
    result.style.color = data.ok ? "#16a34a" : "#dc2626";
  } catch (e) {
    result.textContent = "Verzoek mislukt: " + e.message;
    result.style.color = "#dc2626";
  }
}
</script>
{% endblock %}
